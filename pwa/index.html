<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Coach">
  <meta name="theme-color" content="#000000">
  <title>Triathlon Coach</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --blue: #1a6fff;
      --green: #00C896;
      --yellow: #FFB800;
      --red: #FF4444;
      --bg: #000;
      --card: #111;
      --card2: #181818;
      --border: #222;
      --text: #e0e0e0;
      --muted: #555;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Display', Arial, sans-serif; }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(0,0,0,.92); backdrop-filter: blur(20px);
      padding: calc(var(--safe-top) + 12px) 20px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-badge { background: var(--blue); color: #fff; font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; padding: 4px 9px; border-radius: 5px; }
    .header-title { font-size: 17px; font-weight: 700; color: #fff; }
    .refresh-btn { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; color: var(--muted); font-size: 16px; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .refresh-btn:active { background: #2a2a2a; transform: scale(.93); }
    .refresh-btn.spinning { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Scroll body ── */
    .body { padding: 16px 16px calc(var(--safe-bot) + 80px); max-width: 600px; margin: 0 auto; }

    /* ── Date + frase ── */
    .frase-block { background: var(--card); border-radius: 14px; padding: 18px; margin-bottom: 12px; border-left: 3px solid var(--blue); }
    .frase-date { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; }
    .frase-text { font-size: 19px; font-weight: 700; color: #fff; line-height: 1.3; }

    /* ── Section label ── */
    .slabel { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .14em; color: var(--muted); margin: 20px 0 10px; }

    /* ── Status row ── */
    .sem-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .sem-box { border-radius: 10px; padding: 12px 6px; text-align: center; }
    .sem-box .se { font-size: 20px; display: block; }
    .sem-box .sl { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; display: block; margin-top: 5px; }

    /* ── Badges ── */
    .badges-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .badge { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 4px 10px; border-radius: 5px; border: 1px solid; }

    /* ── Metric cards ── */
    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .mc { background: var(--card2); border-radius: 10px; padding: 12px 10px; border-left: 3px solid; }
    .mc .mi { font-size: 14px; margin-bottom: 4px; }
    .mc .ml { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: #444; }
    .mc .mv { font-size: 18px; font-weight: 700; line-height: 1.1; margin: 3px 0 2px; }
    .mc .ms { font-size: 10px; color: #444; }

    /* ── Tables ── */
    .tbl-wrap { background: var(--card2); border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 8px 10px; font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: #444; text-align: left; border-bottom: 1px solid #2a2a2a; }
    tbody tr { border-bottom: 1px solid #1e1e1e; }
    tbody tr:last-child { border-bottom: none; }
    td { padding: 10px; font-size: 12px; color: #ccc; vertical-align: middle; }
    td.ico { font-size: 18px; width: 32px; }
    td.name { font-weight: 600; color: #ddd; }
    td.mono { font-family: 'SF Mono', monospace; color: #888; white-space: nowrap; font-size: 11px; }

    /* ── Briefing ── */
    .briefing-card { background: #07111f; border-left: 3px solid var(--blue); border-radius: 10px; padding: 16px; }
    .briefing-label { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--blue); margin-bottom: 10px; }
    .briefing-text { font-size: 13px; color: #9ab8d8; line-height: 1.75; white-space: pre-line; }

    /* ── Alert ── */
    .alert-card { background: #110000; border-left: 3px solid var(--red); border-radius: 10px; padding: 14px; margin-top: 10px; font-size: 13px; color: #cc5555; line-height: 1.5; }

    /* ── Race predictions ── */
    .prev-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .prev-item { background: var(--card2); border-radius: 10px; padding: 10px 6px; text-align: center; }
    .prev-d { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: #444; }
    .prev-t { font-size: 15px; font-weight: 700; color: #fff; margin-top: 4px; font-family: 'SF Mono', monospace; }

    /* ── Divider ── */
    .divider { height: 1px; background: #1a1a1a; margin: 16px 0; }

    /* ── Empty/Loading ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty h2 { font-size: 18px; color: #888; margin-bottom: 8px; }
    .empty p { font-size: 13px; line-height: 1.6; }

    .loading-bar { height: 3px; background: linear-gradient(90deg, var(--blue), #00C896, var(--blue)); background-size: 200%; animation: loading 1.2s linear infinite; border-radius: 2px; margin-bottom: 20px; }
    @keyframes loading { 0%{background-position:0%} 100%{background-position:200%} }

    /* ── Bottom nav ── */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 8px 0 calc(var(--safe-bot) + 4px); display: flex; justify-content: space-around; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 0; transition: opacity .15s; }
    .nav-btn.active .nav-icon, .nav-btn.active .nav-label { color: var(--blue); }
    .nav-icon { font-size: 20px; color: #444; }
    .nav-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: #444; }

    /* ── Last updated ── */
    .last-updated { text-align: center; font-size: 10px; color: #333; margin-top: 16px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-badge">⌚</span>
    <span class="header-title">Triathlon Coach</span>
  </div>
  <button class="refresh-btn" id="refreshBtn" onclick="loadReport(true)">↻</button>
</div>

<div class="body" id="appBody">
  <div class="empty">
    <div class="empty-icon">⌚</div>
    <h2>Carregando briefing...</h2>
    <p>Buscando seu relatório diário</p>
  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-btn active" onclick="scrollTo(0,0)">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">Hoje</span>
  </div>
  <div class="nav-btn" onclick="scrollToSection('treinos')">
    <span class="nav-icon">📊</span>
    <span class="nav-label">Treinos</span>
  </div>
  <div class="nav-btn" onclick="scrollToSection('coach')">
    <span class="nav-icon">🤖</span>
    <span class="nav-label">Coach IA</span>
  </div>
  <div class="nav-btn" onclick="scrollToSection('calendario')">
    <span class="nav-icon">📅</span>
    <span class="nav-label">Agenda</span>
  </div>
</nav>

<script>
const REPORT_URL = "report.json";

const STATUS_COLORS = {
  "ÓTIMO":"#00C896","BOM":"#00C896","MODERADO":"#FFB800",
  "BAIXO":"#FF8C00","CRÍTICO":"#FF4444",
  "SUAVE":"#00C896","IDEAL":"#00C896","ELEVADA":"#FFB800","SOBRECARGA":"#FF4444",
  "MANTER":"#00C896","REDUZIR 20%":"#FFB800","REDUZIR 40%":"#FF8C00",
  "SUBSTITUIR":"#FF4444","DESCANSO":"#888"
};

function semColor(val, lo, hi) {
  if (val === null || val === undefined) return { em:"⚪", bg:"#1c1c1c", dk:"#555" };
  const v = parseFloat(val);
  if (v >= hi) return { em:"🟢", bg:"#00C896", dk:"#003a28" };
  if (v >= lo) return { em:"🟡", bg:"#FFB800", dk:"#3a2a00" };
  return { em:"🔴", bg:"#FF4444", dk:"#3a0000" };
}

function fmt(v, d=1, fb="—") {
  if (v === null || v === undefined) return fb;
  return parseFloat(v).toFixed(d);
}

function badge(txt) {
  if (!txt || txt === "—") return "";
  const c = STATUS_COLORS[txt.toUpperCase()] || "#555";
  return `<span class="badge" style="color:${c};border-color:${c}44;background:${c}18">${txt}</span>`;
}

function hms(sec) {
  if (!sec) return "—";
  sec = parseInt(sec);
  const h = Math.floor(sec/3600), r = sec%3600, m = Math.floor(r/60);
  return h ? `${h}h${String(m).padStart(2,'0')}m` : `${m}m${String(sec%60).padStart(2,'0')}s`;
}

function renderSem(val, lo, hi, label) {
  const { em, bg, dk } = semColor(val, lo, hi);
  return `<div class="sem-box" style="background:${bg}">
    <span class="se">${em}</span>
    <span class="sl" style="color:${dk}">${label}</span>
  </div>`;
}

function renderMC(ico, label, val, sub, hasData) {
  const bc = hasData ? "#1a6fff" : "#242424";
  const vc = hasData ? "#fff" : "#333";
  return `<div class="mc" style="border-color:${bc}">
    <div class="mi">${ico}</div>
    <div class="ml">${label}</div>
    <div class="mv" style="color:${vc}">${val}</div>
    <div class="ms">${sub}</div>
  </div>`;
}

function renderTable(items, cols) {
  if (!items || !items.length) return `<div style="color:#444;font-size:12px;padding:12px">Nenhum registro.</div>`;
  const thead = `<tr>${cols.map(c=>`<th>${c.label}</th>`).join("")}</tr>`;
  const tbody = items.map(row =>
    `<tr>${cols.map(c => `<td class="${c.cls||''}">${row[c.key]||"—"}</td>`).join("")}</tr>`
  ).join("");
  return `<div class="tbl-wrap"><table><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
}

function renderReport(r) {
  const s = r.saude || {};
  const ins = r.insights || {};
  const ontem = r.ontem || [];
  const hoje = r.hoje || [];
  const amanha = r.amanha || [];

  const dias = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
  const dateObj = new Date(r.date + "T12:00:00");
  const diaStr = dias[dateObj.getDay()] + ", " + dateObj.toLocaleDateString("pt-BR");

  // Semáforos
  const acwr = parseFloat(s.acwr);
  let acwrSem = { em:"⚪", bg:"#1c1c1c", dk:"#555" };
  if (!isNaN(acwr)) {
    if (acwr > 1.5)           acwrSem = { em:"🔴", bg:"#FF4444", dk:"#3a0000" };
    else if (acwr >= 0.8)     acwrSem = { em:"🟢", bg:"#00C896", dk:"#003a28" };
    else                      acwrSem = { em:"🟡", bg:"#FFB800", dk:"#3a2a00" };
  }

  // Treinos de ontem
  const treino_rows = ontem.map(t => ({
    ico: t.icone, name: t.nome, dist: t.dist, dur: t.dur,
    perf: t.perf, fc_tss: `FC ${t.fc||"—"} | TSS ${t.tss||"—"}`
  }));
  const treino_cols = [
    {key:"ico",cls:"ico",label:""},
    {key:"name",cls:"name",label:"Atividade"},
    {key:"dist",cls:"mono",label:"Dist"},
    {key:"dur",cls:"mono",label:"Dur"},
    {key:"perf",cls:"mono",label:"Pace/Vel"},
    {key:"fc_tss",cls:"mono",label:"FC / TSS"},
  ];

  // Calendário
  const cal_cols = [
    {key:"icone",cls:"ico",label:""},
    {key:"nome",cls:"name",label:"Treino"},
    {key:"dur",cls:"mono",label:"Duração"},
    {key:"dist",cls:"mono",label:"Distância"},
  ];

  // Previsões
  let prevHTML = "";
  if (s.previsoes && Object.keys(s.previsoes).length) {
    prevHTML = `
      <div class="slabel" style="margin-top:20px">🏁 Previsão de Prova</div>
      <div class="prev-grid">
        ${Object.entries(s.previsoes).map(([k,v])=>`
          <div class="prev-item">
            <div class="prev-d">${k}</div>
            <div class="prev-t">${hms(v)}</div>
          </div>`).join("")}
      </div>`;
  }

  const alertHTML = ins.alerta
    ? `<div class="alert-card">⚠️ ${ins.alerta}</div>` : "";

  return `
    <div class="frase-block">
      <div class="frase-date">${diaStr}</div>
      <div class="frase-text">${ins.frase || "—"}</div>
    </div>

    <div class="slabel">Status Geral</div>
    <div class="sem-row">
      ${renderSem(s.body_battery, 40, 70, "Readiness")}
      <div class="sem-box" style="background:${acwrSem.bg}">
        <span class="se">${acwrSem.em}</span>
        <span class="sl" style="color:${acwrSem.dk}">Carga</span>
      </div>
      ${renderSem(s.hrv, 40, 60, "HRV")}
      ${renderSem(s.sono_score, 60, 80, "Sono")}
    </div>
    <div class="badges-row">
      ${badge(ins.status_readiness)}
      ${badge(ins.status_carga)}
      ${badge(ins.acao_hoje)}
    </div>

    <div class="slabel">Dados Fisiológicos</div>
    <div class="metrics">
      ${renderMC("💤","Sono", fmt(s.sono_h)+"h", `Score ${fmt(s.sono_score,0)} · REM ${fmt(s.sono_rem)}h`, !!s.sono_h)}
      ${renderMC("❤️","HRV", fmt(s.hrv,0)+" ms", `7d ${fmt(s.hrv_7d,0)} · ${(s.hrv_status||"—").toUpperCase()}`, !!s.hrv)}
      ${renderMC("🔋","Body Battery", fmt(s.body_battery,0), `Stress ${fmt(s.stress_avg,0)}`, !!s.body_battery)}
      ${renderMC("💓","Resting HR", fmt(s.rhr,0)+" bpm", `Base ${fmt(s.rhr_baseline,0)} bpm`, !!s.rhr)}
      ${renderMC("📈","ATL / CTL", `${fmt(s.atl,0)} / ${fmt(s.ctl,0)}`, `TSB ${fmt(s.tsb,0)} · ACWR ${fmt(s.acwr,2)}`, !!s.atl)}
      ${renderMC("🫁","VO₂max", fmt(s.vo2max), "ml/kg/min", !!s.vo2max)}
    </div>

    <div class="divider" id="treinos"></div>
    <div class="slabel">Treinos de Ontem</div>
    ${renderTable(treino_rows, treino_cols)}

    <div class="divider" id="coach"></div>
    <div class="briefing-card">
      <div class="briefing-label">🤖 Análise do Coach — IA</div>
      <div class="briefing-text">${(ins.briefing||"—").replace(/\\n/g,"\n")}</div>
    </div>
    ${alertHTML}

    <div class="divider" id="calendario"></div>
    <div class="slabel">Treino de Hoje</div>
    ${hoje.length ? renderTable(hoje, cal_cols) : '<div style="color:#444;font-size:12px;padding:8px 0">Nenhum treino agendado.</div>'}

    <div class="slabel" style="margin-top:16px">Treino de Amanhã</div>
    ${amanha.length ? renderTable(amanha, cal_cols) : '<div style="color:#444;font-size:12px;padding:8px 0">Nenhum treino agendado.</div>'}

    ${prevHTML}
    <div class="last-updated">Atualizado em ${new Date(r.generated_at||r.date).toLocaleString("pt-BR")}</div>
  `;
}

function scrollToSection(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
}

async function loadReport(forceRefresh = false) {
  const btn = document.getElementById("refreshBtn");
  btn.classList.add("spinning");

  const body = document.getElementById("appBody");
  if (forceRefresh) {
    body.innerHTML = '<div class="loading-bar"></div>';
  }

  try {
    const url = REPORT_URL + (forceRefresh ? "?t=" + Date.now() : "");
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    body.innerHTML = renderReport(data);

    // Cache in localStorage
    localStorage.setItem("lastReport", JSON.stringify(data));
    localStorage.setItem("lastReportTime", new Date().toISOString());
  } catch (err) {
    // Try localStorage cache
    const cached = localStorage.getItem("lastReport");
    if (cached) {
      const data = JSON.parse(cached);
      const cachedTime = localStorage.getItem("lastReportTime");
      body.innerHTML = renderReport(data) +
        `<div style="background:#1a1000;border:1px solid #3a2800;border-radius:8px;padding:12px;margin-top:12px;font-size:12px;color:#FFB800;text-align:center">
          📶 Exibindo cache de ${new Date(cachedTime).toLocaleString("pt-BR")}
        </div>`;
    } else {
      body.innerHTML = `
        <div class="empty">
          <div class="empty-icon">⚠️</div>
          <h2>Relatório não encontrado</h2>
          <p>O briefing de hoje ainda não foi gerado.<br>Rode o GitHub Actions manualmente ou aguarde as 8h.</p>
        </div>`;
    }
  }

  btn.classList.remove("spinning");
}

// Service Worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}

// Load on start
loadReport();

// Pull to refresh (touch)
let startY = 0;
document.addEventListener("touchstart", e => { startY = e.touches[0].clientY; }, { passive: true });
document.addEventListener("touchend", e => {
  const dy = e.changedTouches[0].clientY - startY;
  if (dy > 80 && window.scrollY === 0) loadReport(true);
}, { passive: true });
</script>
</body>
</html>
