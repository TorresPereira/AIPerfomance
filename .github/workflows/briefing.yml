name: Triathlon Daily Briefing

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install "garminconnect>=0.2.22"

      - name: Restaurar sessão Garmin
        uses: actions/cache@v4
        with:
          path: /tmp/garmin_cache
          key: garmin-session-v2
          restore-keys: garmin-session-v2

      - name: Criar pastas
        run: mkdir -p pwa docs

      - name: Rodar briefing
        env:
          GARMIN_EMAIL:      ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:   ${{ secrets.GARMIN_PASSWORD }}
          SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
        run: python garmin_briefing.py

      - name: Copiar report.json para docs/
        run: cp pwa/report.json docs/report.json

      - name: Commit report.json no repositório
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/report.json pwa/report.json
          git diff --staged --quiet && echo "Sem alterações" && exit 0
          git commit -m "📊 briefing $(date +'%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:main

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
