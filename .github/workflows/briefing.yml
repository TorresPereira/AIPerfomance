name: Triathlon Daily Briefing

on:
  schedule:
    # 09:00 Alemanha verão (CEST = UTC+2) = 07:00 UTC
    # 09:00 Alemanha inverno (CET  = UTC+1) = 08:00 UTC
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install "garminconnect>=0.2.22"

      - name: Restaurar sessão Garmin
        uses: actions/cache@v4
        with:
          path: /tmp/garmin_cache
          key: garmin-session-v2
          restore-keys: garmin-session-v2

      - name: Criar pasta pwa
        run: mkdir -p pwa

      - name: Rodar briefing
        env:
          GARMIN_EMAIL:      ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:   ${{ secrets.GARMIN_PASSWORD }}
          SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
        run: python garmin_briefing.py

      - name: Deploy PWA → GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pwa
          keep_files: true
