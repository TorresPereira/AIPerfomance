name: Triathlon Daily Briefing

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install "garminconnect>=0.2.22"

      - name: Restaurar sessão Garmin
        uses: actions/cache@v4
        with:
          path: /tmp/garmin_cache
          key: garmin-session-v2
          restore-keys: garmin-session-v2

      - name: Criar pasta pwa
        run: mkdir -p pwa

      - name: Rodar briefing
        env:
          GARMIN_EMAIL:      ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:   ${{ secrets.GARMIN_PASSWORD }}
          SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
        run: python garmin_briefing.py

      - name: Verificar report.json gerado
        run: |
          if [ -f pwa/report.json ]; then
            echo "✅ report.json gerado com $(wc -c < pwa/report.json) bytes"
            cat pwa/report.json | python3 -c "import json,sys; d=json.load(sys.stdin); print('Data:', d['date'], '| HRV:', d['saude'].get('hrv'), '| VO2:', d['saude'].get('vo2max'))"
          else
            echo "❌ report.json NÃO encontrado"
            exit 1
          fi

      - name: Commit e push report.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add pwa/report.json
          if git diff --staged --quiet; then
            echo "Sem alterações para commitar"
          else
            git commit -m "📊 briefing $(date +'%Y-%m-%d %H:%M UTC')"
            git push origin main
            echo "✅ report.json publicado no main"
          fi
