name: Triathlon Daily Briefing

on:
  schedule:
    # 6h horário de Brasília = 9h UTC (BRT = UTC-3)
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install garminconnect

      # Restaura sessão Garmin do cache para evitar 429
      - name: Restaurar sessão Garmin (cache)
        uses: actions/cache@v4
        with:
          path: /tmp/garmin_session.pkl
          key: garmin-session-${{ github.run_id }}
          restore-keys: |
            garmin-session-

      - name: Rodar briefing
        env:
          GARMIN_EMAIL:      ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:   ${{ secrets.GARMIN_PASSWORD }}
          SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
        run: python garmin_briefing.py

      # Salva sessão atualizada no cache para próxima execução
      - name: Salvar sessão Garmin (cache)
        if: always()
        uses: actions/cache@v4
        with:
          path: /tmp/garmin_session.pkl
          key: garmin-session-${{ github.run_id }}
